<!DOCTYPE html>
<html>

<head>
  <title>Memory Graph</title>
  <link rel="stylesheet" href="src/renderer/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>

<body>
  <div class="app">
    <!-- Minimalist Sidebar -->
    <nav class="sidebar">
      <div class="brand">MG</div>
      <div class="nav-item active" id="navTimeline" title="Timeline View">
        <i>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="5" cy="12" r="2" />
            <circle cx="12" cy="7" r="2" />
            <circle cx="19" cy="12" r="2" />
            <circle cx="12" cy="17" r="2" />
            <line x1="7" y1="12" x2="10" y2="7" />
            <line x1="14" y1="7" x2="17" y2="12" />
            <line x1="17" y1="12" x2="14" y2="17" />
            <line x1="10" y1="17" x2="7" y2="12" />
          </svg>
        </i>
        <span>Timeline</span>
      </div>
      <div class="nav-item" id="navPeople" title="People Gallery">
        <i>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="3.5" />
            <path d="M5 20c0-3.314 3.134-6 7-6s7 2.686 7 6" />
            <circle cx="12" cy="12" r="10" stroke-width="1.4" stroke-dasharray="2 3" />
          </svg>
        </i>
        <span>People</span>
      </div>
      <div class="nav-item" id="navMap" title="Map View">
        <i>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="10" r="3" />
            <path d="M12 2C8.134 2 5 5.134 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.866-3.134-7-7-7z" />
          </svg>
        </i>
        <span>Map Mode</span>
      </div>
      <div style="flex: 1;"></div>
      <div class="nav-item" id="manageFoldersBtn" title="Settings">
        <i>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="6" x2="20" y2="6" />
            <line x1="4" y1="12" x2="20" y2="12" />
            <line x1="4" y1="18" x2="20" y2="18" />
            <circle cx="8" cy="6" r="2" fill="currentColor" stroke="none" />
            <circle cx="16" cy="12" r="2" fill="currentColor" stroke="none" />
            <circle cx="10" cy="18" r="2" fill="currentColor" stroke="none" />
          </svg>
        </i>
        <span>Settings</span>
      </div>
    </nav>

    <main class="workspace">
      <!-- Floating Controls Island -->
      <div class="island-top">
        <div class="search-island">
          <input id="searchInput" type="text" placeholder="Search memories..." />
          <button id="clearSearchBtn" style="display: none;">✖</button>
        </div>

        <div style="width: 1px; height: 24px; background: var(--surface-border);"></div>

        <div class="timeline-wrap" id="timelineWrap" style="min-width: 250px;">
          <input id="timeline" type="range" min="0" max="100" value="100" />
          <p id="timeLabel" style="font-size: 0.75rem; color: var(--text-secondary); white-space: nowrap;"></p>
        </div>

        <div class="map-mode-wrap hidden" id="mapModeWrap">
          <div class="map-mode-meta" id="mapModeMeta">0 places · 0 items</div>
          <div class="custom-dropdown" id="mapStyleDropdown">
            <div class="dropdown-trigger">
              <span class="dropdown-label">Voyager</span>
              <i class="dropdown-arrow">▾</i>
            </div>
            <div class="dropdown-menu">
              <div class="dropdown-item active" data-value="voyager">Voyager</div>
              <div class="dropdown-item" data-value="positron">Positron</div>
              <div class="dropdown-item" data-value="darkmatter">Dark Matter</div>
            </div>
          </div>
        </div>

        <div class="groupBy-wrap">
          <div class="custom-dropdown" id="groupByDropdown">
            <div class="dropdown-trigger">
              <span class="dropdown-label">⏱ Chrono</span>
              <i class="dropdown-arrow">▾</i>
            </div>
            <div class="dropdown-menu">
              <div class="dropdown-item active" data-value="date">⏱ Chrono</div>
              <div class="dropdown-item" data-value="tag">◈ Subjects</div>
              <div class="dropdown-item" data-value="person">⊚ Identities</div>
              <div class="dropdown-item" data-value="location">📍 Places</div>
            </div>
          </div>
        </div>

        <div class="ui-filters">
          <button id="filterPortraitBtn" class="filter-chip icon-btn" title="Portraits (1 person)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </button>
          <button id="filterGroupBtn" class="filter-chip icon-btn" title="Groups (2+ people)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
          </button>
        </div>
      </div>

      <p id="status"></p>
      <p id="debug"></p>

      <div id="main-content">
        <div id="viewport">
          <svg id="connections"></svg>
          <div id="gallery"></div>
          <button id="floatingRecenterBtn" class="floating-btn hidden">🎯 Recenter</button>
        </div>
        <div id="map-panel" class="hidden">
          <div id="map"></div>
          <button id="fitMapBtn" class="floating-btn" type="button">🎯 Recenter</button>
        </div>
      </div>
    </main>

    <div id="settingsModal" class="modal-overlay hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Manage Folders</h3>
          <button id="closeSettingsBtn" class="icon-btn">✖</button>
        </div>
        <div class="modal-body">
          <p>The app will scan these folders for photos and videos:</p>
          <div id="rootsList" class="roots-list"></div>
          <button id="addFolderBtn" class="accent-btn">+ Add Folder</button>
          <div class="settings-options">
            <label class="toggle-wrap">
              <input type="checkbox" id="includeVideosCheckbox" checked>
              <span>Include Videos (MP4/MOV)</span>
            </label>
          </div>
          <div class="settings-actions">
            <button id="refreshLibraryBtn" class="filter-chip">🔄 Refresh Library</button>
            <button id="clearCacheActionBtn" class="filter-chip danger">🗑️ Clear Cache</button>
          </div>
        </div>
        <div class="modal-footer">
          <button id="saveSettingsBtn" class="accent-btn">Save & Reload</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Rename Modal -->
  <div id="renameModal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Rename Identity</h3>
        <button id="closeRenameBtn" class="icon-btn">✖</button>
      </div>
      <div class="modal-body">
        <p style="margin-bottom: 1rem; font-size: 0.9rem; color: var(--text-secondary);">Enter a new name for this
          person cluster:</p>
        <input type="text" id="renameInput" placeholder="Enter name..." autofocus
          style="width: 100%; padding: 0.8rem; background: var(--surface-color); border: 1px solid var(--surface-border); border-radius: 8px; color: var(--text-primary); font-size: 1rem;">
      </div>
      <div class="modal-footer">
        <button id="saveRenameBtn" class="accent-btn"
          style="width: 100%; justify-content: center; padding: 0.8rem;">Save Identity</button>
      </div>
    </div>
  </div>
  <script src="src/renderer/app.js"></script>
</body>

</html>
